<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="f1shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="5" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="subshadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#000000"/>
  <!-- F1 — shadowed -->
  <text
    x="256" y="308"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="256"
    fill="#e10600"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-10"
    filter="url(#f1shadow)"
  >F1</text>
  <!-- Fantasy 26 — shadowed -->
  <text
    x="256" y="400"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="700"
    font-size="60"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="2"
    filter="url(#subshadow)"
  >FANTASY 26</text>
</svg>
